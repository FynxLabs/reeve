name: release

on:
  push:
    tags: ["v*.*.*"]

permissions:
  contents: write
  packages: write
  id-token: write # sigstore keyless

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Install cosign
        uses: sigstore/cosign-installer@v4.1.2

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v7
        with:
          distribution: goreleaser
          version: latest
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HOMEBREW_TAP_DEPLOY_KEY: ${{ secrets.HOMEBREW_TAP_DEPLOY_KEY }}

      # Point the floating major tag (v0, v1, ...) at this release so consumers
      # who pin @master always get the latest v0.x. Skipped for prerelease tags
      # (anything with a hyphen, e.g. v1.0.0-rc1). The v0 tag does not match the
      # v*.*.* trigger above, so this force-push does not re-trigger the workflow.
      - name: Move major version tag
        if: ${{ !contains(github.ref_name, '-') }}
        run: |
          set -euo pipefail
          MAJOR="${GITHUB_REF_NAME%%.*}"        # v0.1.0 -> v0
          echo "Pointing $MAJOR at $GITHUB_REF_NAME"
          git tag -f "$MAJOR" "$GITHUB_REF_NAME"
          git push origin "refs/tags/$MAJOR" --force
