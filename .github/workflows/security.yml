name: security

on:
  push:
    branches: [main, master]
  pull_request:
  schedule:
    # Weekly re-scan for CVEs on dormant branches.
    - cron: "0 6 * * 1"
  workflow_dispatch:

permissions:
  contents: read
  security-events: write    # upload SARIF to code scanning
  actions: read

jobs:
  # ───────────────────────── CodeQL (Go SAST) ─────────────────────────
  codeql:
    name: CodeQL
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write
    strategy:
      fail-fast: false
      matrix:
        language: [go]
    steps:
      - uses: actions/checkout@v4
      - uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
          queries: security-extended,security-and-quality
      - uses: github/codeql-action/autobuild@v3
      - uses: github/codeql-action/analyze@v3
        with:
          category: "/language:${{ matrix.language }}"

  # ───────────────────────── Trivy (filesystem + dependencies) ──────
  trivy:
    name: Trivy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@0.28.0
        with:
          scan-type: fs
          scan-ref: .
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH,MEDIUM
          ignore-unfixed: true
          # Exclude directories that will be noisy / irrelevant.
          skip-dirs: openspec,docs,examples

      - name: Upload Trivy SARIF
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-results.sarif
          category: trivy

  # ───────────────────────── Dependency review on PRs ────────────────
  dependency-review:
    name: Dependency review
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: high
          comment-summary-in-pr: on-failure

  # ───────────────────────── Pinned-action audit ─────────────────────
  # Enforces that all third-party actions are pinned to SHAs, not tags —
  # trust-to-pivot mitigation.
  action-pin-check:
    name: Action pin check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Enforce pinned actions
        run: |
          set -euo pipefail
          # Allow first-party org actions (actions/*, github/*) by tag;
          # third-party must be pinned to 40-char SHA.
          ! grep -rE '^\s*uses:\s*(?!actions/|github/|docker/|aquasecurity/|goreleaser/|sigstore/|jdx/|golangci/|pulumi/)[^@]+@v' .github/workflows/ || {
            echo "::error::Third-party actions must be pinned to a commit SHA, not a tag."
            echo "Tip: use 'uses: owner/repo@<40-char-sha> # <tag>' instead of 'uses: owner/repo@<tag>'."
            exit 1
          }
