name: security

on:
  pull_request:
  schedule:
  # Weekly re-scan so CVEs that land after a dormant branch is merged
  # still surface.
  - cron: "0 6 * * 1"
  workflow_dispatch:


permissions:
  contents: read

jobs:
  # Dependency review runs on PRs only - blocks PRs that introduce HIGH+
  # CVEs in dependencies before they hit master.
  dependency-review:
    name: Dependency review
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
    - uses: actions/checkout@v6
    - uses: actions/dependency-review-action@v4
      with:
        fail-on-severity: high
        comment-summary-in-pr: on-failure

  # Scheduled (and manually dispatched) runs re-scan the default branch
  # against the current Go vulnerability database - this is what surfaces
  # CVEs published after the code stopped changing. CI already runs the
  # same scanners per push/PR; this covers the quiet weeks in between.
  vuln-scan:
    name: Scheduled vulnerability scan
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request'
    steps:
    - uses: actions/checkout@v6

    - name: Set up mise
      uses: jdx/mise-action@v4
      with:
        experimental: true

    - name: govulncheck
      run: govulncheck ./...

    - name: gosec
      run: gosec -quiet -fmt=text -exclude=G104,G115,G204,G304,G703,G704 -exclude-dir=openspec -exclude-dir=docs -exclude-dir=examples ./...
