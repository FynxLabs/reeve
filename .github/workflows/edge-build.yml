name: edge-build

# Per-push prebuilt binaries for the GitHub Action fast-path. Every push to
# master/next builds linux amd64+arm64 binaries and publishes them as their
# OWN prerelease tagged <branch>-<shortsha> (e.g. next-5993c47) - one release
# per commit, never a rolling dumping ground. The action, when pinned @master
# or @next, resolves the newest <branch>-* prerelease and downloads its asset.
# These builds are unsigned; hand-cut v*.*.* (and vX.Y.Z-rc) tags remain the
# signed distribution and are entirely the maintainer's call.
#
# The <branch>-<sha> tags do NOT match the release workflow's v*.*.* trigger,
# so publishing here never starts the goreleaser pipeline.

on:
  push:
    branches: [master, next]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  edge:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Build and package (linux amd64 + arm64)
        run: |
          set -euo pipefail
          BRANCH="$GITHUB_REF_NAME"
          SHORTSHA="${GITHUB_SHA::7}"
          DATE=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          mkdir -p dist
          for ARCH in amd64 arm64; do
            CGO_ENABLED=0 GOOS=linux GOARCH="$ARCH" go build -trimpath \
              -ldflags="-s -w -X main.version=${BRANCH}-${SHORTSHA} -X main.commit=${SHORTSHA} -X main.date=${DATE}" \
              -o "dist/${ARCH}/reeve" ./cmd/reeve
            tar -C "dist/${ARCH}" -czf "dist/reeve_linux_${ARCH}.tar.gz" reeve
          done
          (cd dist && sha256sum reeve_linux_*.tar.gz > checksums.txt)
          ls -l dist

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Publish per-push prerelease
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          BRANCH="$GITHUB_REF_NAME"
          SHORTSHA="${GITHUB_SHA::7}"
          TAG="${BRANCH}-${SHORTSHA}"
          # One prerelease per commit. On a re-run of the same commit the tag
          # already exists; clobber its assets (same source, not accumulation).
          if ! gh release view "$TAG" --repo "$GITHUB_REPOSITORY" > /dev/null 2>&1; then
            gh release create "$TAG" --repo "$GITHUB_REPOSITORY" \
              --prerelease \
              --title "reeve ${BRANCH} (${SHORTSHA})" \
              --target "$GITHUB_SHA" \
              --notes "$(cat <<EOF
          Unsigned prebuilt binaries for commit \`${SHORTSHA}\` on \`${BRANCH}\`,
          consumed by the reeve GitHub Action fast-path: a workflow pinned to
          this branch (\`@${BRANCH}\`) resolves the newest \`${BRANCH}-*\`
          prerelease, downloads the matching linux binary, verifies its
          checksum, and skips the Go toolchain + source build. If resolution
          fails (edge build still running, unsupported arch), the action
          silently builds from source.

          For signed, versioned distribution use the hand-cut \`vX.Y.Z\` releases.
          EOF
          )" || echo "release create failed (raced with a concurrent push?) - continuing"
          fi
          gh release upload "$TAG" --repo "$GITHUB_REPOSITORY" --clobber \
            dist/reeve_linux_amd64.tar.gz \
            dist/reeve_linux_arm64.tar.gz \
            dist/checksums.txt

      # Keep the newest N per-push prereleases for this branch and delete the
      # rest (release + its git tag). Keep-latest-N rather than keep-only-1
      # because a concurrent consumer may still be resolving the prior release
      # while this push publishes.
      - name: Prune old per-push prereleases
        env:
          GH_TOKEN: ${{ github.token }}
          KEEP: "10"
        run: |
          set -euo pipefail
          BRANCH="$GITHUB_REF_NAME"
          # Newest-first tags for this branch, everything past the first $KEEP
          # gets its release and tag deleted.
          mapfile -t OLD_TAGS < <(
            gh api "repos/${GITHUB_REPOSITORY}/releases?per_page=100" \
              --jq "[.[] | select(.prerelease and (.tag_name | startswith(\"${BRANCH}-\")))] | sort_by(.created_at) | reverse | .[].tag_name" \
            | tail -n +"$((KEEP + 1))"
          )
          if [ "${#OLD_TAGS[@]}" -eq 0 ]; then
            echo "nothing to prune"
            exit 0
          fi
          for T in "${OLD_TAGS[@]}"; do
            echo "Pruning old prerelease $T"
            gh release delete "$T" --repo "$GITHUB_REPOSITORY" --cleanup-tag --yes \
              || echo "could not delete $T (already pruned by a sibling run?)"
          done
