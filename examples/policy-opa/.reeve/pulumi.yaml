version: 1
config_type: engine

engine:
  type: pulumi

  stacks:
    - pattern: "projects/*"
      stacks: [dev, staging, prod]

  change_mapping:
    ignore_changes:
      - "**/*.md"

  execution:
    max_parallel_stacks: 4
    preview_timeout: 10m

  policy_hooks:
    - name: opa-require-tags
      command:
        - conftest
        - test
        - --policy
        - policies/require_tags.rego
        - "{{plan_json}}"
      on_fail: block
      required: true

    - name: opa-restrict-regions
      command:
        - conftest
        - test
        - --policy
        - policies/restrict_regions.rego
        - "{{plan_json}}"
      on_fail: block
      required: true

    - name: cost-gate
      command: ["./scripts/cost-gate.sh", "{{plan_json}}", "{{env}}"]
      on_fail: warn
      required: false        # skip if infracost isn't installed locally
