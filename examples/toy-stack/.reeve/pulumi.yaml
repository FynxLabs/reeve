version: 1
config_type: engine

engine:
  type: pulumi
  binary:
    path: pulumi

  stacks:
    - pattern: "projects/*"
      stacks: [dev, prod]

  filters:
    exclude: []

  change_mapping:
    ignore_changes:
      - "**/*.md"
      - "**/README*"
      - "**/node_modules/**"

  execution:
    max_parallel_stacks: 2
    preview_timeout: 5m
