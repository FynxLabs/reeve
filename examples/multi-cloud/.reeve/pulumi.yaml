version: 1
config_type: engine

engine:
  type: pulumi

  state:
    backend: s3
    url: s3://mycompany-pulumi-state
    secrets_provider:
      type: awskms
      key: arn:aws:kms:us-east-1:111111111111:key/abc-123-def

  stacks:
    - pattern: "projects/*"
      stacks: [dev, staging, prod]
    - project: payments
      path: projects/payments
      stacks: [prod]

  filters:
    exclude:
      - "projects/sandbox/**"

  change_mapping:
    ignore_changes:
      - "**/*.md"
      - "**/node_modules/**"

  execution:
    max_parallel_stacks: 4
    preview_timeout: 10m
    apply_timeout: 30m
