name: drift

on:
  schedule:
    - cron: "0 */2 * * *"     # critical: every 2 hours
    - cron: "17 */6 * * *"    # prod: every 6 hours, off the hour
    - cron: "0 3 * * *"       # slow-movers: 3am UTC nightly
  workflow_dispatch:
    inputs:
      schedule:
        description: "Schedule name from drift.yaml"
        required: true
        default: prod

permissions:
  contents: read
  issues: write
  id-token: write

jobs:
  critical:
    if: github.event_name == 'workflow_dispatch' && inputs.schedule == 'critical' ||
        (github.event_name == 'schedule' && github.event.schedule == '0 */2 * * *')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: FynxLabs/reeve@main
        with:
          command: "drift run"
          extra-args: "--schedule critical"
          slack-token: ${{ secrets.SLACK_BOT_TOKEN }}
          pulumi-version: "3.231.0"
        env:
          PD_CHANGE_EVENTS_KEY: ${{ secrets.PD_CHANGE_EVENTS_KEY }}

  prod:
    if: github.event_name == 'workflow_dispatch' && inputs.schedule == 'prod' ||
        (github.event_name == 'schedule' && github.event.schedule == '17 */6 * * *')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: FynxLabs/reeve@main
        with:
          command: "drift run"
          extra-args: "--schedule prod --if-stale"
          slack-token: ${{ secrets.SLACK_BOT_TOKEN }}
          pulumi-version: "3.231.0"
        env:
          PD_CHANGE_EVENTS_KEY: ${{ secrets.PD_CHANGE_EVENTS_KEY }}

  slow-movers:
    if: github.event_name == 'workflow_dispatch' && inputs.schedule == 'slow-movers' ||
        (github.event_name == 'schedule' && github.event.schedule == '0 3 * * *')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: FynxLabs/reeve@main
        with:
          command: "drift run"
          extra-args: "--schedule slow-movers"
          slack-token: ${{ secrets.SLACK_BOT_TOKEN }}
          pulumi-version: "3.231.0"
