name: reeve
description: PR-native, self-hosted GitOps orchestrator for Pulumi
author: reeve contributors
branding:
  icon: shield
  color: blue

# NOTE: This composite action is pre-release. It builds reeve from source
# on every run (~30s for the first cache-miss, seconds after). When a
# first release is cut, the install step will switch to downloading a
# signed release tarball.

inputs:
  command:
    description: >-
      reeve subcommand: "preview", "ready", "apply", "pr-help", "lint", "stacks", "drift run",
      "locks list", etc. Omit to auto-detect from the GitHub event context.
    required: false
    default: ""
  ref:
    description: Git ref of FynxLabs/reeve to build from. Defaults to `master`.
    required: false
    default: master
  root:
    description: Path to the consumer repo root (where .reeve/ lives). Defaults to $GITHUB_WORKSPACE.
    required: false
    default: ""
  pulumi-version:
    description: Version of the Pulumi CLI to install. Leave blank to skip.
    required: false
    default: ""
  github-token:
    description: GitHub token (needs issues:write to upsert PR comment).
    required: false
    default: ${{ github.token }}
  slack-token:
    description: Slack bot OAuth token.
    required: false
    default: ""
  gcp-workload-identity-provider:
    description: GCP Workload Identity Provider resource name. Required for GCS bucket auth.
    required: false
    default: ""
  gcp-service-account:
    description: GCP service account email to impersonate via WIF.
    required: false
    default: ""
  extra-args:
    description: Additional args passed verbatim to the reeve subcommand.
    required: false
    default: ""

runs:
  using: composite
  steps:
    - name: Checkout reeve source
      uses: actions/checkout@v6
      with:
        repository: FynxLabs/reeve
        ref: ${{ inputs.ref }}
        path: _reeve
        fetch-depth: 1

    - name: Restore reeve binary cache
      id: reeve-cache
      uses: actions/cache@v5
      with:
        path: ${{ runner.temp }}/reeve-bin/reeve
        key: reeve-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('_reeve/go.sum', '_reeve/**/*.go') }}

    - name: Set up Go (from reeve's go.mod)
      if: steps.reeve-cache.outputs.cache-hit != 'true'
      uses: actions/setup-go@v6
      with:
        go-version-file: _reeve/go.mod
        cache-dependency-path: _reeve/go.sum

    - name: Build reeve
      if: steps.reeve-cache.outputs.cache-hit != 'true'
      shell: bash
      run: |
        set -euo pipefail
        mkdir -p "$RUNNER_TEMP/reeve-bin"
        go build -trimpath -ldflags='-s -w' -o "$RUNNER_TEMP/reeve-bin/reeve" ./cmd/reeve
      working-directory: _reeve

    - name: Add reeve to PATH
      shell: bash
      run: echo "$RUNNER_TEMP/reeve-bin" >> "$GITHUB_PATH"

    - name: Authenticate to GCP
      if: ${{ inputs.gcp-workload-identity-provider != '' }}
      uses: google-github-actions/auth@v3
      with:
        workload_identity_provider: ${{ inputs.gcp-workload-identity-provider }}
        service_account: ${{ inputs.gcp-service-account }}

    - name: Install Pulumi CLI
      if: ${{ inputs.pulumi-version != '' }}
      uses: pulumi/actions@v6
      with:
        pulumi-version: ${{ inputs.pulumi-version }}

    - name: Run reeve
      shell: bash
      env:
        GITHUB_TOKEN: ${{ inputs.github-token }}
        SLACK_BOT_TOKEN: ${{ inputs.slack-token }}
        REEVE_BIN: ${{ runner.temp }}/reeve-bin/reeve
      run: |
        set -euo pipefail
        ROOT="${{ inputs.root }}"
        if [ -z "$ROOT" ]; then ROOT="$GITHUB_WORKSPACE"; fi
        cd "$ROOT"

        CMD="${{ inputs.command }}"
        EXTRA="${{ inputs.extra-args }}"

        # Auto-detect command from event context when not explicitly set
        if [[ -z "$CMD" ]]; then
          if [[ "$GITHUB_EVENT_NAME" == "pull_request" ]]; then
            ACTION=$(jq -r .action < "$GITHUB_EVENT_PATH")
            if [[ "$ACTION" == "ready_for_review" ]]; then
              CMD="ready"
            else
              CMD="preview"
            fi
          elif [[ "$GITHUB_EVENT_NAME" == "issue_comment" ]]; then
            COMMENT_BODY=$(jq -r .comment.body < "$GITHUB_EVENT_PATH")
            if [[ "$COMMENT_BODY" == /reeve\ apply* || "$COMMENT_BODY" == /reeve\ up* ]]; then
              CMD="apply"
            elif [[ "$COMMENT_BODY" == /reeve\ ready* ]]; then
              CMD="ready"
            elif [[ "$COMMENT_BODY" == /reeve\ preview* || "$COMMENT_BODY" == /reeve\ plan* ]]; then
              CMD="preview"
            elif [[ "$COMMENT_BODY" == /reeve\ help* ]]; then
              CMD="pr-help"
            else
              echo "Not a reeve command, skipping."
              exit 0
            fi
          else
            echo "Not a reeve event ($GITHUB_EVENT_NAME), skipping."
            exit 0
          fi
        fi

        case "$CMD" in
          preview|"run preview")
            if [[ "$GITHUB_EVENT_NAME" == "pull_request" ]]; then
              PR_NUMBER=$(jq -r .pull_request.number < "$GITHUB_EVENT_PATH")
              "$REEVE_BIN" run preview --pr "$PR_NUMBER" $EXTRA
            elif [[ "$GITHUB_EVENT_NAME" == "issue_comment" ]]; then
              PR_NUMBER=$(jq -r '.issue.number' < "$GITHUB_EVENT_PATH")
              "$REEVE_BIN" run preview --pr "$PR_NUMBER" $EXTRA
            else
              "$REEVE_BIN" run preview --local $EXTRA
            fi
            ;;
          ready|"run ready")
            PR_NUMBER=$(jq -r '.pull_request.number // .issue.number' < "$GITHUB_EVENT_PATH")
            "$REEVE_BIN" run ready --pr "$PR_NUMBER" $EXTRA
            ;;
          apply|"run apply")
            PR_NUMBER=$(jq -r '.pull_request.number // .issue.number' < "$GITHUB_EVENT_PATH")
            "$REEVE_BIN" run apply --pr "$PR_NUMBER" $EXTRA
            ;;
          pr-help|"run pr-help")
            PR_NUMBER=$(jq -r '.issue.number // 0' < "$GITHUB_EVENT_PATH")
            "$REEVE_BIN" run pr-help --pr "$PR_NUMBER" $EXTRA
            ;;
          *)
            "$REEVE_BIN" $CMD $EXTRA
            ;;
        esac
