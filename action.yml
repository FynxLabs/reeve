name: reeve
description: PR-native, self-hosted GitOps orchestrator for Pulumi
author: reeve contributors
branding:
  icon: shield
  color: blue

# NOTE: This composite action is pre-release. It builds reeve from source
# on every run (~30s for the first cache-miss, seconds after). When a
# first release is cut, the install step will switch to downloading a
# signed release tarball.

inputs:
  command:
    description: >-
      reeve subcommand: "preview", "ready", "apply", "pr-help", "lint", "stacks", "drift run",
      "locks list", etc. Omit to auto-detect from the GitHub event context.
    required: false
    default: ""
  root:
    description: Path to the consumer repo root (where .reeve/ lives). Defaults to $GITHUB_WORKSPACE.
    required: false
    default: ""
  pulumi-version:
    description: Version of the Pulumi CLI to install. Leave blank to skip.
    required: false
    default: ""
  github-token:
    description: GitHub token (needs issues:write to upsert PR comment).
    required: false
    default: ${{ github.token }}
  slack-token:
    description: Slack bot OAuth token.
    required: false
    default: ""
  gcp-workload-identity-provider:
    description: GCP Workload Identity Provider resource name. Required for GCS bucket auth.
    required: false
    default: ""
  gcp-service-account:
    description: GCP service account email to impersonate via WIF.
    required: false
    default: ""
  extra-args:
    description: Additional args passed verbatim to the reeve subcommand.
    required: false
    default: ""
  log-level:
    description: Log level for reeve (debug, info, warn, error).
    required: false
    default: ""

runs:
  using: composite
  steps:
    # reeve's own source is already on disk at github.action_path - it's the
    # tree GHA checked out for the @ref this action was pinned with (@v1, @master,
    # @v1.2.3). Build from there directly: no re-clone, no ref resolution, so the
    # binary always matches the pinned action version.
    - name: Hash reeve source
      id: reeve-hash
      shell: bash
      env:
        ACTION_PATH: ${{ github.action_path }}
      run: |
        set -euo pipefail
        HASH=$(find "$ACTION_PATH" \( -name '*.go' -o -name 'go.mod' -o -name 'go.sum' \) -type f \
          -exec sha256sum {} + | sort | sha256sum | cut -d' ' -f1)
        echo "hash=$HASH" >> "$GITHUB_OUTPUT"

    - name: Restore reeve binary cache
      id: reeve-cache
      uses: actions/cache@v5
      with:
        path: ${{ runner.temp }}/reeve-bin/reeve
        key: reeve-${{ runner.os }}-${{ runner.arch }}-${{ steps.reeve-hash.outputs.hash }}

    - name: Set up Go (from reeve's go.mod)
      if: steps.reeve-cache.outputs.cache-hit != 'true'
      uses: actions/setup-go@v6
      with:
        go-version-file: ${{ github.action_path }}/go.mod
        cache-dependency-path: ${{ github.action_path }}/go.sum

    - name: Build reeve
      if: steps.reeve-cache.outputs.cache-hit != 'true'
      shell: bash
      run: |
        set -euo pipefail
        mkdir -p "$RUNNER_TEMP/reeve-bin"
        go build -trimpath -ldflags='-s -w' -o "$RUNNER_TEMP/reeve-bin/reeve" ./cmd/reeve
      working-directory: ${{ github.action_path }}

    - name: Add reeve to PATH
      shell: bash
      run: echo "$RUNNER_TEMP/reeve-bin" >> "$GITHUB_PATH"

    - name: Checkout PR HEAD
      # Only check out a PR head when the event is actually about a PR. A
      # comment on a plain (non-PR) issue has issue.number set but no
      # refs/pull/<n>/head, so keying on issue.number made the job fail red.
      # issue.pull_request is present only when the issue is a PR.
      if: ${{ github.event.pull_request.number || github.event.issue.pull_request }}
      uses: actions/checkout@v6
      with:
        ref: refs/pull/${{ github.event.pull_request.number || github.event.issue.number }}/head
        fetch-depth: 1

    - name: Authenticate to GCP
      if: ${{ inputs.gcp-workload-identity-provider != '' }}
      uses: google-github-actions/auth@v3
      with:
        workload_identity_provider: ${{ inputs.gcp-workload-identity-provider }}
        service_account: ${{ inputs.gcp-service-account }}

    - name: Install Pulumi CLI
      if: ${{ inputs.pulumi-version != '' }}
      uses: pulumi/actions@v7
      with:
        pulumi-version: ${{ inputs.pulumi-version }}

    - name: Run reeve
      shell: bash
      env:
        GITHUB_TOKEN: ${{ inputs.github-token }}
        SLACK_BOT_TOKEN: ${{ inputs.slack-token }}
        REEVE_BIN: ${{ runner.temp }}/reeve-bin/reeve
        REEVE_LOG_LEVEL: ${{ inputs.log-level }}
      run: |
        set -euo pipefail
        ROOT="${{ inputs.root }}"
        if [ -z "$ROOT" ]; then ROOT="$GITHUB_WORKSPACE"; fi
        cd "$ROOT"

        CMD="${{ inputs.command }}"
        EXTRA="${{ inputs.extra-args }}"

        # Auto-detect command from event context when not explicitly set
        if [[ -z "$CMD" ]]; then
          if [[ "$GITHUB_EVENT_NAME" == "pull_request_review" ]]; then
            REVIEW_STATE=$(jq -r .review.state < "$GITHUB_EVENT_PATH")
            if [[ "$REVIEW_STATE" == "approved" ]]; then
              CMD="approved"
            else
              echo "Review state '$REVIEW_STATE' - skipping."
              exit 0
            fi
          elif [[ "$GITHUB_EVENT_NAME" == "pull_request" ]]; then
            ACTION=$(jq -r .action < "$GITHUB_EVENT_PATH")
            if [[ "$ACTION" == "ready_for_review" ]]; then
              CMD="ready"
            else
              CMD="preview"
            fi
          elif [[ "$GITHUB_EVENT_NAME" == "issue_comment" ]]; then
            COMMENT_BODY=$(jq -r .comment.body < "$GITHUB_EVENT_PATH")
            # Parse the first line into tokens and match the VERB exactly, so
            # "/reeve update the docs?" is NOT treated as apply (the old
            # "/reeve up*" prefix match did exactly that).
            read -r PREFIX VERB REST <<< "$(printf '%s' "$COMMENT_BODY" | head -n1)"
            if [[ "$PREFIX" != "/reeve" ]]; then
              echo "Not a reeve command, skipping."
              exit 0
            fi
            case "$VERB" in
              apply|up)
                CMD="apply"
                # Re-apply an already-applied commit: "--force" or "force" as a token.
                if [[ " $REST " == *" --force "* || " $REST " == *" force "* ]]; then
                  EXTRA="$EXTRA --force"
                fi
                ;;
              ready)         CMD="ready" ;;
              preview|plan)  CMD="preview" ;;
              help)          CMD="pr-help" ;;
              *)
                echo "Unknown reeve command '${VERB:-}', skipping."
                exit 0
                ;;
            esac
          else
            echo "Not a reeve event ($GITHUB_EVENT_NAME), skipping."
            exit 0
          fi
        fi

        case "$CMD" in
          preview|"run preview")
            if [[ "$GITHUB_EVENT_NAME" == "pull_request" ]]; then
              PR_NUMBER=$(jq -r .pull_request.number < "$GITHUB_EVENT_PATH")
              "$REEVE_BIN" run preview --pr "$PR_NUMBER" $EXTRA
            elif [[ "$GITHUB_EVENT_NAME" == "issue_comment" ]]; then
              PR_NUMBER=$(jq -r '.issue.number' < "$GITHUB_EVENT_PATH")
              "$REEVE_BIN" run preview --pr "$PR_NUMBER" $EXTRA
            else
              "$REEVE_BIN" run preview --local $EXTRA
            fi
            ;;
          approved|"run approved")
            PR_NUMBER=$(jq -r '.pull_request.number' < "$GITHUB_EVENT_PATH")
            "$REEVE_BIN" run approved --pr "$PR_NUMBER" $EXTRA
            ;;
          ready|"run ready")
            PR_NUMBER=$(jq -r '.pull_request.number // .issue.number' < "$GITHUB_EVENT_PATH")
            "$REEVE_BIN" run ready --pr "$PR_NUMBER" $EXTRA
            ;;
          apply|"run apply")
            PR_NUMBER=$(jq -r '.pull_request.number // .issue.number' < "$GITHUB_EVENT_PATH")
            "$REEVE_BIN" run apply --pr "$PR_NUMBER" $EXTRA
            ;;
          pr-help|"run pr-help")
            PR_NUMBER=$(jq -r '.issue.number // 0' < "$GITHUB_EVENT_PATH")
            "$REEVE_BIN" run pr-help --pr "$PR_NUMBER" $EXTRA
            ;;
          *)
            "$REEVE_BIN" $CMD $EXTRA
            ;;
        esac
