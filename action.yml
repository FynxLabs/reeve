name: reeve
description: PR-native, self-hosted GitOps orchestrator for Pulumi
author: reeve contributors
branding:
  icon: shield
  color: blue

# NOTE: Install is three-tier, cache first:
#   1. Cache hit on the source hash -> reuse the cached binary (seconds).
#   2. Cache miss -> try a prebuilt binary:
#        @vX.Y.Z       -> that release's tarball, verified against the
#                         release's checksums.txt (signed release pipeline).
#        @master/@next -> the rolling edge-<branch> prerelease asset whose
#                         name embeds this exact source hash, so the binary
#                         provably matches the checked-out action source
#                         (unsigned; published by edge-build.yml).
#   3. Any other ref (SHA pins, branches, forks), or any download/verify
#      failure -> build from source (~30s on the first miss), as before.

inputs:
  command:
    description: >-
      reeve subcommand: "preview", "ready", "apply", "pr-help", "lint", "stacks", "drift run",
      "locks list", etc. Omit to auto-detect from the GitHub event context.
    required: false
    default: ""
  root:
    description: Path to the consumer repo root (where .reeve/ lives). Defaults to $GITHUB_WORKSPACE.
    required: false
    default: ""
  pulumi-version:
    description: Version of the Pulumi CLI to install. Leave blank to skip.
    required: false
    default: ""
  github-token:
    description: GitHub token (needs issues:write to upsert PR comment).
    required: false
    default: ${{ github.token }}
  slack-token:
    description: Slack bot OAuth token.
    required: false
    default: ""
  gcp-workload-identity-provider:
    description: GCP Workload Identity Provider resource name. Required for GCS bucket auth.
    required: false
    default: ""
  gcp-service-account:
    description: GCP service account email to impersonate via WIF.
    required: false
    default: ""
  extra-args:
    description: Additional args passed verbatim to the reeve subcommand.
    required: false
    default: ""
  allowed-associations:
    description: >-
      Comma-separated author_association values allowed to trigger comment
      commands (/reeve ...). Commenters outside this list are skipped before
      any command dispatch. The approvals gate still applies afterwards.
    required: false
    default: "OWNER,MEMBER,COLLABORATOR"
  command-prefix:
    description: >-
      Comma-separated list of comment prefixes accepted as reeve commands.
      The first word of a comment must exactly match one of these (spaces
      around entries are trimmed). Default accepts both the slash style
      ("/reeve apply") and the mention style ("@reeve apply").
    required: false
    default: "/reeve,@reeve"
  run-on-approval:
    description: >-
      Set "true" to dispatch "run approved" when a pull_request_review is
      submitted with state approved (requires subscribing the workflow to
      pull_request_review events). Default "false": approvals do not change
      code and the apply gate re-checks approvals at apply time, so these
      runs are pure CI cost. Tradeoff when disabled: you lose the automatic
      approved-state notification (e.g. the Slack "ready to apply" update)
      that reeve posts the moment a PR is approved.
    required: false
    default: "false"
  log-level:
    description: Log level for reeve (debug, info, warn, error).
    required: false
    default: ""

runs:
  using: composite
  steps:
    # reeve's own source is already on disk at github.action_path - it's the
    # tree GHA checked out for the @ref this action was pinned with (@v1, @master,
    # @v1.2.3). Build from there directly: no re-clone, no ref resolution, so the
    # binary always matches the pinned action version.
    - name: Hash reeve source
      id: reeve-hash
      shell: bash
      env:
        ACTION_PATH: ${{ github.action_path }}
      run: |
        set -euo pipefail
        # Shared with edge-build.yml so the cache key / edge-asset hash can
        # never drift from the hash the edge builds were named with.
        echo "hash=$("$ACTION_PATH/.github/scripts/source-hash.sh" "$ACTION_PATH")" >> "$GITHUB_OUTPUT"

    - name: Restore reeve binary cache
      id: reeve-cache
      uses: actions/cache@v5
      with:
        path: ${{ runner.temp }}/reeve-bin/reeve
        key: reeve-${{ runner.os }}-${{ runner.arch }}-${{ steps.reeve-hash.outputs.hash }}

    # On a cache miss, try a prebuilt binary before reaching for the Go
    # toolchain (see the NOTE at the top for the ref semantics). The script
    # never fails the job: any problem (missing asset, checksum mismatch,
    # network, unsupported arch) logs why and reports fetched=false, which
    # re-enables the source-build steps below. actions/cache's post step
    # saves whatever ends up at the cached path, downloaded or built alike.
    - name: Fetch prebuilt binary
      id: reeve-fetch
      if: steps.reeve-cache.outputs.cache-hit != 'true'
      shell: bash
      env:
        ACTION_PATH: ${{ github.action_path }}
        REEVE_REF: ${{ github.action_ref }}
        REEVE_REPO: ${{ github.action_repository }}
        REEVE_SRCHASH: ${{ steps.reeve-hash.outputs.hash }}
        REEVE_OS: ${{ runner.os }}
        REEVE_ARCH: ${{ runner.arch }}
        REEVE_DEST: ${{ runner.temp }}/reeve-bin/reeve
        GH_TOKEN: ${{ inputs.github-token }}
      run: |
        set -euo pipefail
        "$ACTION_PATH/.github/scripts/fetch-binary.sh"

    - name: Set up Go (from reeve's go.mod)
      if: steps.reeve-cache.outputs.cache-hit != 'true' && steps.reeve-fetch.outputs.fetched != 'true'
      uses: actions/setup-go@v6
      with:
        go-version-file: ${{ github.action_path }}/go.mod
        cache-dependency-path: ${{ github.action_path }}/go.sum

    - name: Build reeve
      if: steps.reeve-cache.outputs.cache-hit != 'true' && steps.reeve-fetch.outputs.fetched != 'true'
      shell: bash
      env:
        SRCHASH: ${{ steps.reeve-hash.outputs.hash }}
      run: |
        set -euo pipefail
        mkdir -p "$RUNNER_TEMP/reeve-bin"
        go build -trimpath -ldflags="-s -w -X main.version=source-${SRCHASH:0:12}" \
          -o "$RUNNER_TEMP/reeve-bin/reeve" ./cmd/reeve
      working-directory: ${{ github.action_path }}

    - name: Add reeve to PATH
      shell: bash
      run: echo "$RUNNER_TEMP/reeve-bin" >> "$GITHUB_PATH"

    - name: Checkout PR HEAD
      # Only check out a PR head when the event is actually about a PR. A
      # comment on a plain (non-PR) issue has issue.number set but no
      # refs/pull/<n>/head, so keying on issue.number made the job fail red.
      # issue.pull_request is present only when the issue is a PR.
      if: ${{ github.event.pull_request.number || github.event.issue.pull_request }}
      uses: actions/checkout@v6
      with:
        ref: refs/pull/${{ github.event.pull_request.number || github.event.issue.number }}/head
        fetch-depth: 1

    - name: Authenticate to GCP
      if: ${{ inputs.gcp-workload-identity-provider != '' }}
      uses: google-github-actions/auth@v3
      with:
        workload_identity_provider: ${{ inputs.gcp-workload-identity-provider }}
        service_account: ${{ inputs.gcp-service-account }}

    - name: Install Pulumi CLI
      if: ${{ inputs.pulumi-version != '' }}
      uses: pulumi/actions@v7
      with:
        pulumi-version: ${{ inputs.pulumi-version }}

    - name: Run reeve
      shell: bash
      env:
        GITHUB_TOKEN: ${{ inputs.github-token }}
        SLACK_BOT_TOKEN: ${{ inputs.slack-token }}
        REEVE_BIN: ${{ runner.temp }}/reeve-bin/reeve
        REEVE_LOG_LEVEL: ${{ inputs.log-level }}
        # Threaded to the reeve binary so the opt-in pr_comment approval source
        # can re-enforce the SAME authorization gate this step applies to
        # command dispatch when it reads historical `/reeve approve` comments.
        REEVE_ALLOWED_ASSOCIATIONS: ${{ inputs.allowed-associations }}
        REEVE_COMMAND_PREFIXES: ${{ inputs.command-prefix }}
      run: |
        set -euo pipefail
        ROOT="${{ inputs.root }}"
        if [ -z "$ROOT" ]; then ROOT="$GITHUB_WORKSPACE"; fi
        cd "$ROOT"

        CMD="${{ inputs.command }}"
        EXTRA="${{ inputs.extra-args }}"

        # Auto-detect command from event context when not explicitly set
        if [[ -z "$CMD" ]]; then
          if [[ "$GITHUB_EVENT_NAME" == "pull_request_review" ]]; then
            # Review-triggered runs are opt-in. Approvals don't change code,
            # and the apply gate re-checks approvals at apply time, so a run
            # here is pure CI cost - its only effect is the approved-state
            # notification (Slack "ready to apply" update).
            if [[ "${{ inputs.run-on-approval }}" != "true" ]]; then
              echo "pull_request_review dispatch is opt-in (run-on-approval is not 'true') - skipping."
              exit 0
            fi
            REVIEW_STATE=$(jq -r .review.state < "$GITHUB_EVENT_PATH")
            if [[ "$REVIEW_STATE" == "approved" ]]; then
              CMD="approved"
            else
              echo "Review state '$REVIEW_STATE' - skipping."
              exit 0
            fi
          elif [[ "$GITHUB_EVENT_NAME" == "pull_request" ]]; then
            # Explicit trigger matrix: only code-changing actions run preview,
            # and ready_for_review runs ready. Everything else (labeled,
            # assigned, edited, ...) is a no-op instead of a wasted preview.
            ACTION=$(jq -r .action < "$GITHUB_EVENT_PATH")
            case "$ACTION" in
              opened|reopened|synchronize)
                CMD="preview"
                ;;
              ready_for_review)
                CMD="ready"
                ;;
              closed)
                # Merge-triggered apply (the merge-then-apply / continuous-
                # delivery flow). Only a MERGED close dispatches; a plain
                # close (PR abandoned) runs nothing. We always dispatch the
                # apply with --trigger-source merge and let the binary decide:
                # the binary is the source of truth for the mode and no-ops
                # unless apply.trigger is "merge", so a merge event in a
                # comment-mode repo can never force an apply.
                MERGED=$(jq -r '.pull_request.merged // false' < "$GITHUB_EVENT_PATH")
                if [[ "$MERGED" == "true" ]]; then
                  CMD="apply"
                  EXTRA="$EXTRA --trigger-source merge"
                else
                  echo "pull_request closed without merge - skipping."
                  exit 0
                fi
                ;;
              *)
                echo "pull_request action '$ACTION' does not trigger reeve - skipping."
                exit 0
                ;;
            esac
          elif [[ "$GITHUB_EVENT_NAME" == "issue_comment" ]]; then
            # Self-trigger guard: reeve posts its own PR comments with the
            # workflow token. If one of those (or any other bot's comment)
            # ever contains a command prefix, dispatching on it would loop
            # reeve back onto itself. Skip all bot-authored comments.
            AUTHOR_TYPE=$(jq -r '.comment.user.type // ""' < "$GITHUB_EVENT_PATH")
            AUTHOR_LOGIN=$(jq -r '.comment.user.login // ""' < "$GITHUB_EVENT_PATH")
            if [[ "$AUTHOR_TYPE" == "Bot" || "$AUTHOR_LOGIN" == *"[bot]" ]]; then
              echo "Comment authored by bot '${AUTHOR_LOGIN}' - skipping (self-trigger guard)."
              exit 0
            fi
            COMMENT_BODY=$(jq -r .comment.body < "$GITHUB_EVENT_PATH")
            # Parse the first line into tokens and match the VERB exactly, so
            # "/reeve update the docs?" is NOT treated as apply (the old
            # "/reeve up*" prefix match did exactly that).
            read -r PREFIX VERB REST <<< "$(printf '%s' "$COMMENT_BODY" | head -n1)"
            # The first word must exactly match one of the configured
            # command prefixes (default: "/reeve" and "@reeve").
            PREFIX_OK=false
            IFS=',' read -ra PREFIXES <<< "${{ inputs.command-prefix }}"
            for P in "${PREFIXES[@]}"; do
              P=$(printf '%s' "$P" | tr -d '[:space:]')
              if [[ -n "$P" && "$P" == "$PREFIX" ]]; then
                PREFIX_OK=true
                break
              fi
            done
            if [[ "$PREFIX_OK" != true ]]; then
              echo "Not a reeve command, skipping."
              exit 0
            fi
            # Authorization gate: dispatch used to be purely on comment text,
            # so on a public repo anyone who could comment could start a run
            # with live federated credentials. Require the commenter's
            # author_association to be in the allowlist before ANY verb.
            ASSOC=$(jq -r '.comment.author_association // "NONE"' < "$GITHUB_EVENT_PATH")
            AUTHORIZED=false
            IFS=',' read -ra ALLOWED <<< "${{ inputs.allowed-associations }}"
            for A in "${ALLOWED[@]}"; do
              A=$(printf '%s' "$A" | tr -d '[:space:]' | tr '[:lower:]' '[:upper:]')
              if [[ -n "$A" && "$A" == "$ASSOC" ]]; then
                AUTHORIZED=true
                break
              fi
            done
            if [[ "$AUTHORIZED" != true ]]; then
              echo "Commenter not authorized to run reeve commands (association: $ASSOC) - skipping."
              exit 0
            fi
            case "$VERB" in
              apply|up)
                CMD="apply"
                # Comment-initiated apply. The binary rejects this (no-op) when
                # apply.trigger is "merge", so exactly one initiation path
                # applies per repo.
                EXTRA="$EXTRA --trigger-source comment"
                # Re-apply an already-applied commit: "--force" or "force" as a token.
                if [[ " $REST " == *" --force "* || " $REST " == *" force "* ]]; then
                  EXTRA="$EXTRA --force"
                fi
                ;;
              ready)         CMD="ready" ;;
              approve)
                # Opt-in pr_comment approval source. The comment itself IS the
                # approval - the apply gate re-reads it at apply time (and
                # re-checks author_association there). Dispatching "approved"
                # here just refreshes the approved-state notification (Slack
                # "ready to apply"), mirroring the pull_request_review path. It
                # never applies. Unauthorized commenters were already rejected
                # by the authorization gate above.
                CMD="approved"
                ;;
              breakglass)
                # /reeve breakglass "<justification>" apply — the CLI does the
                # strict parse (and posts a helpful comment when malformed);
                # the raw comment body travels via env, never shell-expanded.
                CMD="apply"
                EXTRA="$EXTRA --break-glass"
                REEVE_BREAK_GLASS_COMMENT="$COMMENT_BODY"
                export REEVE_BREAK_GLASS_COMMENT
                ;;
              preview|plan)  CMD="preview" ;;
              unlock)
                CMD="unlock"
                # Optional "project/stack" token scopes the unlock to one
                # lock; bare "/reeve unlock" frees everything this PR holds
                # or is queued on. Only this PR's entries are ever touched.
                # "--force" (or "force") clears a holder even mid-apply.
                UNLOCK_REF=""
                read -r FIRST _ <<< "$REST"
                if [[ -n "$FIRST" && "$FIRST" != -* && "$FIRST" == */* ]]; then
                  UNLOCK_REF="$FIRST"
                fi
                if [[ " $REST " == *" --force "* || " $REST " == *" force "* ]]; then
                  EXTRA="$EXTRA --force"
                fi
                ;;
              help)          CMD="pr-help" ;;
              *)
                echo "Unknown reeve command '${VERB:-}', skipping."
                exit 0
                ;;
            esac
          else
            echo "Not a reeve event ($GITHUB_EVENT_NAME), skipping."
            exit 0
          fi
        fi

        case "$CMD" in
          preview|"run preview")
            if [[ "$GITHUB_EVENT_NAME" == "pull_request" ]]; then
              PR_NUMBER=$(jq -r .pull_request.number < "$GITHUB_EVENT_PATH")
              "$REEVE_BIN" run preview --pr "$PR_NUMBER" $EXTRA
            elif [[ "$GITHUB_EVENT_NAME" == "issue_comment" ]]; then
              PR_NUMBER=$(jq -r '.issue.number' < "$GITHUB_EVENT_PATH")
              "$REEVE_BIN" run preview --pr "$PR_NUMBER" $EXTRA
            else
              "$REEVE_BIN" run preview --local $EXTRA
            fi
            ;;
          approved|"run approved")
            # .pull_request.number on the review path; .issue.number on the
            # issue_comment path (/reeve approve).
            PR_NUMBER=$(jq -r '.pull_request.number // .issue.number' < "$GITHUB_EVENT_PATH")
            "$REEVE_BIN" run approved --pr "$PR_NUMBER" $EXTRA
            ;;
          ready|"run ready")
            PR_NUMBER=$(jq -r '.pull_request.number // .issue.number' < "$GITHUB_EVENT_PATH")
            "$REEVE_BIN" run ready --pr "$PR_NUMBER" $EXTRA
            ;;
          apply|"run apply")
            PR_NUMBER=$(jq -r '.pull_request.number // .issue.number' < "$GITHUB_EVENT_PATH")
            "$REEVE_BIN" run apply --pr "$PR_NUMBER" $EXTRA
            ;;
          unlock)
            # PR-scoped lock cleanup: removes this PR from lock holders and
            # queues (one stack, or all of them). Never touches other PRs'
            # locks - admin force-unlock stays CLI-only. If reeve refuses
            # because the PR looks mid-apply, relay the hint back onto the
            # PR as a comment (the commenter isn't watching the run log).
            PR_NUMBER=$(jq -r '.pull_request.number // .issue.number' < "$GITHUB_EVENT_PATH")
            set +e
            UNLOCK_OUT=$("$REEVE_BIN" locks unlock ${UNLOCK_REF:+"$UNLOCK_REF"} --pr "$PR_NUMBER" $EXTRA 2>&1)
            UNLOCK_STATUS=$?
            set -e
            printf '%s\n' "$UNLOCK_OUT"
            if [[ $UNLOCK_STATUS -ne 0 && "$UNLOCK_OUT" == *"re-run with --force"* ]]; then
              HINT=$(printf '%s\n' "$UNLOCK_OUT" | grep -m1 're-run with --force' | sed 's/^Error: //')
              BODY="⚠️ ${HINT/re-run with --force/comment \`/reeve unlock --force\` if you are sure}"
              curl -sf -X POST \
                -H "Authorization: Bearer $GITHUB_TOKEN" \
                -H "Accept: application/vnd.github+json" \
                "${GITHUB_API_URL:-https://api.github.com}/repos/$GITHUB_REPOSITORY/issues/$PR_NUMBER/comments" \
                -d "$(jq -n --arg b "$BODY" '{body:$b}')" > /dev/null \
                || echo "warning: could not post refusal comment"
              exit 0
            fi
            exit $UNLOCK_STATUS
            ;;
          pr-help|"run pr-help")
            PR_NUMBER=$(jq -r '.issue.number // 0' < "$GITHUB_EVENT_PATH")
            "$REEVE_BIN" run pr-help --pr "$PR_NUMBER" $EXTRA
            ;;
          *)
            "$REEVE_BIN" $CMD $EXTRA
            ;;
        esac
