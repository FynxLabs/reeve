version: 2

project_name: reeve

before:
  hooks:
  - go mod tidy

builds:
- id: reeve
  main: ./cmd/reeve
  binary: reeve
  env:
  - CGO_ENABLED=0
  goos:
  - linux
  - darwin
  goarch:
  - amd64
  - arm64
  ldflags:
  - -s -w
  - -X main.version={{.Version}}
  - -X main.commit={{.ShortCommit}}
  - -X main.date={{.Date}}

archives:
- id: default
  ids: [ reeve ]
  name_template: >-
    {{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}
  files:
  - README.md
  - LICENSE
  - CONTRIBUTING.md

checksum:
  name_template: "checksums.txt"
  algorithm: sha256

signs:
# cosign keyless - requires sigstore/cosign-installer in the release workflow
# and OIDC-enabled GH Actions.
- cmd: cosign
  signature: "${artifact}.bundle"
  args:
  - sign-blob
  - "--yes"
  - "--bundle=${signature}"
  - "${artifact}"
  artifacts: checksum
  output: true

snapshot:
  version_template: "{{ incpatch .Version }}-dev"

changelog:
  use: github-native
  sort: asc

release:
  github:
    owner: fynxlabs
    name: reeve
  draft: true
  replace_existing_draft: true
  prerelease: auto
  header: |
    # reeve {{ .Version }}

    PR-native, self-hosted GitOps orchestrator for Pulumi. No control plane,
    no telemetry, MIT-licensed.

homebrew_casks:
- name: reeve
  binaries: [ reeve ]
  repository:
    owner: fynxlabs
    name: homebrew-tap
  directory: Casks
  homepage: "https://github.com/fynxlabs/reeve"
  description: "PR-native, self-hosted GitOps orchestrator for Pulumi"
  # strip the quarantine xattr so the unsigned binary runs without Gatekeeper prompt
  hooks:
    post:
      install: |
        if OS.mac?
          system_command "/usr/bin/xattr", args: ["-dr", "com.apple.quarantine", "#{staged_path}/reeve"]
        end

dockers_v2:
- id: reeve
  ids: [ reeve ]
  dockerfile: Dockerfile.release
  images:
  - "ghcr.io/fynxlabs/reeve"
  tags:
  - "{{ .Tag }}"
  - "v{{ .Major }}"
  - "latest"
  platforms:
  - linux/amd64
  - linux/arm64
  labels:
    org.opencontainers.image.source: "https://github.com/fynxlabs/reeve"
    org.opencontainers.image.version: "{{ .Version }}"
    org.opencontainers.image.licenses: MIT
