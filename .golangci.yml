# golangci-lint config. The load-bearing rule is depguard: internal/core/*
# must stay pure - only stdlib and sibling core packages allowed.
#
# Run: golangci-lint run

version: "2"

run:
  timeout: 5m

linters:
  default: none
  enable:
  - depguard
  - errcheck
  - govet
  - ineffassign
  - staticcheck
  - unused

  settings:
    errcheck:
      # Standard Go convention: defer Close() / fmt.Fprint* to stdout/stderr
      # are fire-and-forget. Only flag return values that carry real business
      # errors.
      exclude-functions:
      - (io.Closer).Close
      - (*os.File).Close
      - fmt.Fprint
      - fmt.Fprintf
      - fmt.Fprintln
      - os.Remove
      - os.RemoveAll
      - (github.com/spf13/pflag.Value).Set

    depguard:
      rules:
        core-purity:
          # internal/core and its subpackages may only import stdlib or
          # other internal/core/* siblings. No external SDKs, no adapters.
          list-mode: lax
          files:
          - "**/internal/core/**/*.go"
          allow:
          - $gostd
          - github.com/thefynx/reeve/internal/core
          deny:
          - pkg: github.com/aws
            desc: "internal/core must be pure - move adapter code out of core/"
          - pkg: cloud.google.com
            desc: "internal/core must be pure - move adapter code out of core/"
          - pkg: github.com/Azure
            desc: "internal/core must be pure - move adapter code out of core/"
          - pkg: github.com/google/go-github
            desc: "internal/core must be pure - move adapter code out of core/"
          - pkg: github.com/hashicorp
            desc: "internal/core must be pure - move adapter code out of core/"
          - pkg: github.com/slack-go
            desc: "internal/core must be pure - move adapter code out of core/"
          - pkg: github.com/spf13/cobra
            desc: "internal/core must be pure - CLI wiring belongs in cmd/"
          - pkg: github.com/spf13/viper
            desc: "internal/core must be pure - config loading belongs in internal/config"
          - pkg: go.opentelemetry.io
            desc: "internal/core must be pure - telemetry belongs in internal/observability"
          - pkg: github.com/pulumi
            desc: "internal/core must be pure - engine code belongs in internal/iac/pulumi"

formatters:
  enable:
  - gofmt
  - goimports
